name: Build LSPosed APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Unzip source project
        run: |
          rm -rf buildsrc
          unzip -o BiliHDRBlackBarsFix-cloud-build.zip -d buildsrc
          echo "===== files after unzip ====="
          find buildsrc -maxdepth 4 -type f | sort | head -120
          PROJECT_DIR=$(find buildsrc -name settings.gradle -print -quit | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR"
          if [ -z "$PROJECT_DIR" ]; then
            echo "No settings.gradle found after unzip"
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Patch repositories
        run: |
          cd "$PROJECT_DIR"
          python3 - <<'PY'
          from pathlib import Path

          p = Path("settings.gradle")
          s = p.read_text()

          if "api.xposed.info" not in s:
              s = s.replace(
                  "repositories { google(); mavenCentral() }",
                  "repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }"
              )

              s = s.replace(
                  """repositories {
              google()
              mavenCentral()
          }""",
                  """repositories {
              google()
              mavenCentral()
              maven { url 'https://api.xposed.info/' }
          }"""
              )

          p.write_text(s)
          print("===== patched settings.gradle =====")
          print(p.read_text())
          PY

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliHDRBlackBarsFix-v2-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
