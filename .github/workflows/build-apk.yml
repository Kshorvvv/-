name: Build LSPosed APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Unzip source project
        run: |
          unzip -o BiliHDRBlackBarsFix-cloud-build.zip -d buildsrc
          ls -R buildsrc | head -80

      - name: Patch repositories
        run: |
          cd buildsrc/BiliHDRBlackBarsFix-cloud-build
          python3 - <<'PY'
          from pathlib import Path
          p = Path("settings.gradle")
          s = p.read_text()
          if "api.xposed.info" not in s:
              s = s.replace(
                  "repositories { google(); mavenCentral() }",
                  "repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }"
              )
          p.write_text(s)
          PY

      - name: Build debug APK
        run: |
          cd buildsrc/BiliHDRBlackBarsFix-cloud-build
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliHDRBlackBarsFix-debug-apk
          path: buildsrc/BiliHDRBlackBarsFix-cloud-build/app/build/outputs/apk/debug/*.apk
