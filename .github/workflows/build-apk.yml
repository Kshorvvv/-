name: Build LSPosed APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Create Android project
        run: |
          set -e
          PROJECT_DIR="$RUNNER_TEMP/BiliHDRBlackBarsFix"
          mkdir -p "$PROJECT_DIR/app/src/main/java/com/kshor/bilihdrfix"
          mkdir -p "$PROJECT_DIR/app/src/main/assets"
          mkdir -p "$PROJECT_DIR/app/src/main/res/values"

          cat > "$PROJECT_DIR/settings.gradle" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://api.xposed.info/' }
              }
          }
          rootProject.name = 'BiliHDRBlackBarsFix'
          include ':app'
          EOF

          cat > "$PROJECT_DIR/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF

          cat > "$PROJECT_DIR/app/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.kshor.bilihdrfix'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.kshor.bilihdrfix'
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName '0.2.0-conservative'
              }
          }

          dependencies {
              compileOnly 'de.robv.android.xposed:api:82'
          }
          EOF

          cat > "$PROJECT_DIR/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:allowBackup="false"
                  android:supportsRtl="true">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="@string/xposed_description" />
                  <meta-data android:name="xposedminversion" android:value="82" />
              </application>
          </manifest>
          EOF

          cat > "$PROJECT_DIR/app/src/main/res/values/strings.xml" <<'EOF'
          <resources>
              <string name="app_name">Bili HDR Black Bars Fix V2</string>
              <string name="xposed_description">V2 conservative: only forces black Activity/window background. Does not touch video surfaces or unlock content.</string>
          </resources>
          EOF

          cat > "$PROJECT_DIR/app/src/main/res/values/styles.xml" <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
              </style>
          </resources>
          EOF

          cat > "$PROJECT_DIR/app/src/main/assets/xposed_init" <<'EOF'
          com.kshor.bilihdrfix.HookEntry
          EOF

          cat > "$PROJECT_DIR/app/src/main/java/com/kshor/bilihdrfix/HookEntry.java" <<'EOF'
          package com.kshor.bilihdrfix;

          import android.app.Activity;
          import android.graphics.Color;
          import android.graphics.drawable.ColorDrawable;
          import android.os.Build;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;

          import java.util.Arrays;
          import java.util.HashSet;
          import java.util.Set;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;

          public final class HookEntry implements IXposedHookLoadPackage {
              private static final String TAG = "BiliHDRBlackBarsFixV2";

              private static final Set<String> TARGET_PACKAGES = new HashSet<>(Arrays.asList(
                      "tv.danmaku.bilibilihd",
                      "tv.danmaku.bili",
                      "com.bilibili.app.in"
              ));

              @Override
              public void handleLoadPackage(final XC_LoadPackage.LoadPackageParam lpparam) {
                  if (!TARGET_PACKAGES.contains(lpparam.packageName)) return;
                  XposedBridge.log(TAG + ": loaded in " + lpparam.packageName);
                  hookActivityLifecycle();
              }

              private static void hookActivityLifecycle() {
                  XposedBridge.hookAllMethods(Activity.class, "onCreate", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) {
                          Activity activity = (Activity) param.thisObject;
                          applyBlackWindowBackground(activity);
                      }
                  });

                  XposedBridge.hookAllMethods(Activity.class, "onResume", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) {
                          Activity activity = (Activity) param.thisObject;
                          applyBlackWindowBackground(activity);

                          View decor = safeDecor(activity);
                          if (decor != null) {
                              decor.postDelayed(() -> applyBlackWindowBackground(activity), 300);
                              decor.postDelayed(() -> applyBlackWindowBackground(activity), 1000);
                              decor.postDelayed(() -> applyBlackWindowBackground(activity), 2500);
                          }
                      }
                  });

                  XposedBridge.hookAllMethods(Activity.class, "onWindowFocusChanged", new XC_MethodHook() {
                      @Override
                      protected void afterHookedMethod(MethodHookParam param) {
                          Activity activity = (Activity) param.thisObject;
                          applyBlackWindowBackground(activity);
                      }
                  });
              }

              private static View safeDecor(Activity activity) {
                  try {
                      Window w = activity != null ? activity.getWindow() : null;
                      return w != null ? w.getDecorView() : null;
                  } catch (Throwable ignored) {
                      return null;
                  }
              }

              private static void applyBlackWindowBackground(Activity activity) {
                  if (activity == null) return;

                  try {
                      Window w = activity.getWindow();
                      if (w == null) return;

                      w.setBackgroundDrawable(new ColorDrawable(Color.BLACK));

                      int flagsToClear =
                              WindowManager.LayoutParams.FLAG_TRANSLUCENT_STATUS
                                      | WindowManager.LayoutParams.FLAG_TRANSLUCENT_NAVIGATION
                                      | WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS
                                      | WindowManager.LayoutParams.FLAG_SHOW_WALLPAPER;

                      w.clearFlags(flagsToClear);
                      w.addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);

                      if (Build.VERSION.SDK_INT >= 21) {
                          w.setStatusBarColor(Color.BLACK);
                          w.setNavigationBarColor(Color.BLACK);
                      }

                      View decor = w.getDecorView();
                      if (decor != null) {
                          decor.setBackgroundColor(Color.BLACK);
                      }
                  } catch (Throwable t) {
                      XposedBridge.log(TAG + ": window patch failed: " + t);
                  }
              }
          }
          EOF

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliHDRBlackBarsFix-v2-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apkname: Build LSPosed APK

