name: Build LSPosed APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Unzip source project
        run: |
          set -eux
          rm -rf buildsrc
          unzip -o BiliHDRBlackBarsFix-cloud-build.zip -d buildsrc
          find buildsrc -maxdepth 4 -type f | sort | head -120

      - name: Patch Xposed Maven repository
        run: |
          set -eux
          cd buildsrc/BiliHDRBlackBarsFix-cloud-build
          python3 -c "from pathlib import Path; p=Path('settings.gradle'); s=p.read_text(); s=s.replace(\"repositories { google(); mavenCentral() }\", \"repositories { google(); mavenCentral(); maven { url 'https://api.xposed.info/' } }\"); p.write_text(s); print(p.read_text())"

      - name: Build debug APK
        run: |
          set -eux
          cd buildsrc/BiliHDRBlackBarsFix-cloud-build
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliHDRBlackBarsFix-v2-debug-apk
          path: buildsrc/BiliHDRBlackBarsFix-cloud-build/app/build/outputs/apk/debug/*.apk
